<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ORACLE — Слово Дня</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: rgba(201,168,76,0.15);
      --text: #f0ead6;
      --muted: #666666;
      --red: #c94c4c;
      --green: #4cc97a;
      --font-display: 'Playfair Display', serif;
      --font-mono: 'Space Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      overflow-x: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }

    /* Decorative corner lines */
    .corner { position: fixed; width: 80px; height: 80px; }
    .corner--tl { top: 24px; left: 24px; border-top: 1px solid var(--border); border-left: 1px solid var(--border); }
    .corner--tr { top: 24px; right: 24px; border-top: 1px solid var(--border); border-right: 1px solid var(--border); }
    .corner--bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--border); border-left: 1px solid var(--border); }
    .corner--br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }

    /* Network badge */
    .network-badge {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .network-badge .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* Main card */
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      position: relative;
      padding: 3rem 3rem 2.5rem;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      background: linear-gradient(135deg, var(--gold) 0%, transparent 40%, transparent 60%, var(--gold) 100%);
      opacity: 0.12;
      pointer-events: none;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
      position: relative;
    }

    .header .eyebrow {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .header h1 {
      font-family: var(--font-display);
      font-size: 3.5rem;
      font-weight: 900;
      font-style: italic;
      line-height: 1;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, #8a6a1e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider-icon {
      color: var(--gold);
      font-size: 16px;
      opacity: 0.6;
    }

    .subtitle {
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
    }

    /* Wallet section */
    .wallet-section { margin-bottom: 2rem; }

    .wallet-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      margin-bottom: 1rem;
    }

    .wallet-address {
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 0.05em;
    }

    .wallet-status {
      font-size: 10px;
      color: var(--green);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .wallet-status .dot-green {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--green);
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 1rem 2rem;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid;
      background: transparent;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: currentColor;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn:hover::before { opacity: 0.06; }
    .btn:active::before { opacity: 0.12; }

    .btn-gold {
      color: var(--gold);
      border-color: var(--gold);
    }
    .btn-gold:hover {
      box-shadow: 0 0 20px rgba(201,168,76,0.15), inset 0 0 20px rgba(201,168,76,0.05);
    }

    .btn-ghost {
      color: var(--muted);
      border-color: var(--border);
      font-size: 10px;
      padding: 0.6rem;
      margin-top: 0.5rem;
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* Steps */
    .steps {
      display: flex;
      gap: 0;
      margin-bottom: 2rem;
    }
    .step {
      flex: 1;
      text-align: center;
      position: relative;
    }
    .step:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 12px;
      right: -50%;
      width: 100%;
      height: 1px;
      background: var(--border);
      z-index: 0;
    }
    .step.active:not(:last-child)::after { background: var(--gold); opacity: 0.4; }

    .step-num {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px;
      margin: 0 auto 0.4rem;
      background: var(--bg);
      position: relative;
      z-index: 1;
      transition: all 0.3s;
    }
    .step.active .step-num {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold-dim);
    }
    .step.done .step-num {
      border-color: var(--green);
      color: var(--green);
      background: rgba(76,201,122,0.1);
    }
    .step-label {
      font-size: 8px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .step.active .step-label { color: var(--gold); }
    .step.done .step-label { color: var(--green); }

    /* Phrase reveal */
    .phrase-container {
      border: 1px solid var(--border);
      background: var(--bg);
      padding: 2rem;
      text-align: center;
      position: relative;
      margin-bottom: 2rem;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .phrase-container.locked {
      filter: blur(0);
    }

    .phrase-container.locked .phrase-text {
      filter: blur(6px);
      user-select: none;
      pointer-events: none;
    }

    .phrase-tag {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      padding: 3px 10px;
      border: 1px solid;
    }
    .phrase-tag.motivation { color: var(--gold); border-color: rgba(201,168,76,0.3); }
    .phrase-tag.demotivation { color: var(--red); border-color: rgba(201,76,76,0.3); }

    .phrase-text {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-style: italic;
      line-height: 1.6;
      color: var(--text);
      transition: filter 0.5s ease;
    }

    .phrase-author {
      margin-top: 1rem;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .lock-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .lock-icon { font-size: 2rem; opacity: 0.4; }
    .lock-text { font-size: 10px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }

    /* Status messages */
    .status-msg {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-align: center;
      padding: 0.75rem;
      border: 1px solid;
      margin-bottom: 1rem;
      line-height: 1.6;
    }
    .status-msg.info { color: var(--gold); border-color: rgba(201,168,76,0.2); background: rgba(201,168,76,0.05); }
    .status-msg.error { color: var(--red); border-color: rgba(201,76,76,0.2); background: rgba(201,76,76,0.05); }
    .status-msg.success { color: var(--green); border-color: rgba(76,201,122,0.2); background: rgba(76,201,122,0.05); }

    .tx-link {
      color: var(--gold);
      text-decoration: none;
      font-size: 9px;
      letter-spacing: 0.1em;
      border-bottom: 1px solid rgba(201,168,76,0.3);
    }
    .tx-link:hover { border-color: var(--gold); }

    /* Footer */
    .footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      line-height: 2;
    }

    .footer a { color: var(--muted); text-decoration: none; }
    .footer a:hover { color: var(--gold); }

    /* Loading spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 1px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    /* Reveal animation */
    @keyframes revealIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .reveal-anim { animation: revealIn 0.6s ease forwards; }

    /* Hidden */
    .hidden { display: none !important; }

    @media (max-width: 600px) {
      .card { padding: 2rem 1.5rem; }
      .header h1 { font-size: 2.5rem; }
    }
  </style>
</head>
<body>

  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <div class="network-badge">
    <div class="dot"></div>
    Base Network
  </div>

  <div class="page">

      <div class="header">
        <div class="eyebrow">Web3 Oracle</div>
        <h1>Oracle</h1>
        <div class="divider"><span class="divider-icon">◆</span></div>

      </div>

      <!-- Steps indicator -->

        <div class="step active" id="step1">

          <div class="step-label">Кошелёк</div>
        </div>
        <div class="step" id="step2">
          <div class="step-num">2</div>
          <div class="step-label">Транзакция</div>
        </div>

          <div class="step-num">3</div>
          <div class="step-label">Послание</div>
        </div>
      </div>

      <!-- Wallet info (hidden until connected) -->
      <div class="wallet-section">
        <div class="wallet-info hidden" id="walletInfo">

          <div class="wallet-status">
            <div class="dot-green"></div>
            Подключён
          </div>
        </div>

        <!-- Connect button -->
        <button class="btn btn-gold" id="connectBtn" onclick="connectWallet()">
          Подключить кошелёк
        </button>

        <!-- Disconnect button -->
        <button class="btn btn-ghost hidden" id="disconnectBtn" onclick="disconnectWallet()">
          Отключить
        </button>
      </div>

      <!-- Status message -->
      <div class="status-msg info hidden" id="statusMsg"></div>

      <!-- Phrase (blurred/locked until tx done) -->
      <div class="phrase-container locked" id="phraseContainer">
        <div class="lock-overlay" id="lockOverlay">
          <div class="lock-icon">⬡</div>

        <div id="phraseInner" style="opacity:0;">

          <div class="phrase-text" id="phraseText"></div>
          <div class="phrase-author" id="phraseAuthor"></div>

      </div>

      <!-- Send TX button (hidden until connected) -->
      <button class="btn btn-gold hidden" id="txBtn" onclick="sendTransaction()">

      <!-- Try Again button (hidden until phrase revealed) -->
      <button class="btn btn-gold hidden" id="tryAgainBtn" onclick="tryAgain()">
        ✦ Try Your Luck Again
      </button>

      <!-- TX link -->
      <div style="text-align:center;margin-top:0.75rem;min-height:16px;" id="txLinkContainer"></div>

      <div class="footer">
        Сеть: Base Mainnet &nbsp;·&nbsp; Chain ID: 8453<br />
        Транзакция — перевод 0 ETH самому себе<br />
        Оплачивается только комиссия сети
      </div>
    </div>
  </div>

    function setStatus(msg, type = 'info') {
      const el = document.getElementById('statusMsg');
      el.className = `status-msg ${type}`;

        const el = document.getElementById(`step${i}`);
        el.classList.remove('active', 'done');
        if (i < active) el.classList.add('done');
        if (i === active) el.classList.add('active');
      }
    }

    function shortAddr(addr) {
      return addr.slice(0, 6) + '...' + addr.slice(-4);
    }

    // ─── Connect ──────────────────────────────────────────────────────────────
    async function connectWallet() {
      if (!window.ethereum) {
        setStatus('Кошелёк не обнаружен. Установи MetaMask или другой EVM-кошелёк.', 'error');
        return;
      }

      const btn = document.getElementById('connectBtn');
      btn.innerHTML = '<span class="spinner"></span>Подключение...';
      btn.disabled = true;
      clearStatus();

      try {
        provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send('eth_requestAccounts', []);
        signer = await provider.getSigner();
        userAddress = await signer.getAddress();

        // Check network
        const network = await provider.getNetwork();
        if (network.chainId !== BASE_CHAIN_ID) {
          setStatus('Нужна сеть <strong>Base Mainnet</strong> (Chain ID 8453). Переключи сеть в кошельке.', 'error');
          try {
            await window.ethereum.request({
              method: 'wallet_switchEthereumChain',
              params: [{ chainId: '0x2105' }],
            });
            // after switch, re-init
            provider = new ethers.BrowserProvider(window.ethereum);
            signer = await provider.getSigner();
            userAddress = await signer.getAddress();
            clearStatus();
          } catch (switchErr) {
            if (switchErr.code === 4902) {
              // Add Base network
              try {
                await window.ethereum.request({
                  method: 'wallet_addEthereumChain',
                  params: [{
                    chainId: '0x2105',
                    chainName: 'Base',
                    nativeCurrency: { name: 'Ether', symbol: 'ETH', decimals: 18 },
                    rpcUrls: ['https://mainnet.base.org'],
                    blockExplorerUrls: ['https://basescan.org'],
                  }],
                });
                provider = new ethers.BrowserProvider(window.ethereum);
                signer = await provider.getSigner();
                userAddress = await signer.getAddress();
                clearStatus();
              } catch {
                setStatus('Не удалось добавить сеть Base. Добавь вручную в кошельке.', 'error');
                btn.innerHTML = 'Подключить кошелёк';
                btn.disabled = false;
                return;
              }
            } else {
              btn.innerHTML = 'Подключить кошелёк';
              btn.disabled = false;
              return;
            }
          }
        }

        // UI update
        document.getElementById('walletAddress').textContent = shortAddr(userAddress);
        document.getElementById('walletInfo').classList.remove('hidden');
        document.getElementById('connectBtn').classList.add('hidden');
        document.getElementById('disconnectBtn').classList.remove('hidden');
        document.getElementById('txBtn').classList.remove('hidden');

        // Pick a random phrase NOW (seeded by address+date)
        pickPhrase();
        showLockedPhrase();

        updateSteps(2);
        setStatus('Кошелёк подключён. Теперь отправь транзакцию в сети Base, чтобы раскрыть послание.', 'info');

      } catch (err) {
        const msg = err.code === 4001 ? 'Запрос отклонён.' : 'Ошибка подключения.';
        setStatus(msg, 'error');
        btn.innerHTML = 'Подключить кошелёк';
        btn.disabled = false;
      }
    }

    // ─── Phrase logic ─────────────────────────────────────────────────────────
    let selectedPhrase = null;

    function pickPhrase() {
      // Seed by address + today's date so phrase is consistent per wallet per day
      const today = new Date().toISOString().slice(0, 10);
      const seed = (userAddress || '') + today;
      let hash = 0;
      for (let i = 0; i < seed.length; i++) {
        hash = ((hash << 5) - hash) + seed.charCodeAt(i);
        hash |= 0;
      }
      const idx = Math.abs(hash) % phrases.length;
      selectedPhrase = phrases[idx];
    }

    function showLockedPhrase() {
      const container = document.getElementById('phraseContainer');
      const inner = document.getElementById('phraseInner');
      const overlay = document.getElementById('lockOverlay');
      const text = document.getElementById('phraseText');
      const tag = document.getElementById('phraseTag');
      const author = document.getElementById('phraseAuthor');

      text.textContent = selectedPhrase.text;
      tag.textContent = selectedPhrase.type === 'motivation' ? '✦ Мотивация' : '✦ Демотивация';
      tag.className = 'phrase-tag ' + selectedPhrase.type;
      author.textContent = selectedPhrase.author;
      inner.style.opacity = '1';
      inner.style.filter = 'blur(8px)';
      overlay.classList.remove('hidden');
    }

    function revealPhrase() {
      const inner = document.getElementById('phraseInner');
      const overlay = document.getElementById('lockOverlay');
      overlay.classList.add('hidden');
      inner.style.filter = 'blur(0)';
      inner.style.transition = 'filter 0.8s ease';
      inner.classList.add('reveal-anim');
    }

    function showLockedDefault() {
      const container = document.getElementById('phraseContainer');
      const inner = document.getElementById('phraseInner');
      const overlay = document.getElementById('lockOverlay');
      inner.style.opacity = '0';
      overlay.classList.remove('hidden');
    }

    // ─── Send TX ──────────────────────────────────────────────────────────────
    async function sendTransaction() {
      if (!signer) return;

      const btn = document.getElementById('txBtn');
      btn.innerHTML = '<span class="spinner"></span>Ожидание подтверждения...';
      btn.disabled = true;
      clearStatus();
      document.getElementById('txLinkContainer').innerHTML = '';

      try {
        // Проверяем баланс перед отправкой
        const balance = await provider.getBalance(userAddress);
        const feeData = await provider.getFeeData();
        const gasPrice = feeData.gasPrice || feeData.maxFeePerGas || 1000000n;
        const estimatedGas = gasPrice * 21000n;

        if (balance < estimatedGas) {
          setStatus('❌ Insufficient ETH for gas on Base. Top up your balance and try again.', 'error');
          btn.innerHTML = 'Send Transaction → Reveal Message';
          btn.disabled = false;
          return;
        }

        // Проверяем что мы в Base Mainnet
        const network = await provider.getNetwork();
        if (network.chainId !== 8453n) {
          setStatus('❌ Switch to Base Mainnet in your wallet and reconnect.', 'error');
          btn.innerHTML = 'Send Transaction → Reveal Message';
          btn.disabled = false;
          return;
        }

        // Self-transfer 0 ETH — платишь только газ сети
        const tx = await signer.sendTransaction({
          to: userAddress,
          value: 0n,
        });

        setStatus(`<span class="spinner"></span>Транзакция отправлена. Ожидаем подтверждения...`, 'info');

        const receipt = await tx.wait();

        // Show TX link
        document.getElementById('txLinkContainer').innerHTML =
          `<a class="tx-link" href="https://basescan.org/tx/${tx.hash}" target="_blank" rel="noopener">
            View on Basescan ↗
          </a>`;

        // Reveal!
        clearStatus();
        revealPhrase();
        btn.classList.add('hidden');
        updateSteps(3);

        setStatus('✦ Транзакция подтверждена. Послание раскрыто.', 'success');

      } catch (err) {
        console.error('TX Error:', err);
        let msg = '';
        const code = err?.code;
        const reason = err?.reason || err?.message || '';

        if (code === 4001 || code === 'ACTION_REJECTED' || reason.includes('rejected') || reason.includes('denied')) {
          msg = '❌ Transaction rejected in wallet.';
        } else if (reason.includes('insufficient funds') || reason.includes('insufficient balance')) {
          msg = '❌ Insufficient ETH for gas. Top up your Base balance.';
        } else if (reason.includes('network') || reason.includes('chain')) {
          msg = '❌ Network error. Make sure your wallet is on Base Mainnet.';
        } else {
          msg = `❌ Error: ${reason.slice(0, 120) || 'Unknown error. Open browser console (F12) for details.'}`;
        }

        setStatus(msg, 'error');
        btn.innerHTML = 'Send Transaction → Reveal Message';
        btn.disabled = false;
      }
    }

    // ─── Try Again ────────────────────────────────────────────────────────────────────────
    function tryAgain() {
      // Pick a NEW random phrase (pure random this time)
      const idx = Math.floor(Math.random() * phrases.length);
      selectedPhrase = phrases[idx];

      // Reset phrase display to locked/blurred
      const inner = document.getElementById('phraseInner');
      const overlay = document.getElementById('lockOverlay');
      inner.style.filter = 'blur(8px)';
      inner.classList.remove('reveal-anim');
      overlay.classList.remove('hidden');

      // Show send TX button again, hide try again
      document.getElementById('txBtn').classList.remove('hidden');
      document.getElementById('txBtn').innerHTML = 'Send Transaction → Reveal Message';
      document.getElementById('txBtn').disabled = false;
      document.getElementById('tryAgainBtn').classList.add('hidden');
      document.getElementById('txLinkContainer').innerHTML = '';

      // Update phrase content (still blurred)
      document.getElementById('phraseText').textContent = selectedPhrase.text;
      document.getElementById('phraseTag').textContent = selectedPhrase.type === 'motivation' ? '❖ Motivation' : '❖ Demotivation';
      document.getElementById('phraseTag').className = 'phrase-tag ' + selectedPhrase.type;
      document.getElementById('phraseAuthor').textContent = selectedPhrase.author;

      updateSteps(2);
      clearStatus();
      setStatus('A new message awaits. Send another transaction to reveal it.', 'info');
    }

        // ─── Disconnect ───────────────────────────────────────────────────────────
    function disconnectWallet() {
      provider = null;
      signer = null;
      userAddress = null;
      selectedPhrase = null;

      document.getElementById('walletInfo').classList.add('hidden');
      document.getElementById('connectBtn').classList.remove('hidden');
      document.getElementById('connectBtn').innerHTML = 'Подключить кошелёк';
      document.getElementById('connectBtn').disabled = false;
      document.getElementById('disconnectBtn').classList.add('hidden');
      document.getElementById('txBtn').classList.add('hidden');
      document.getElementById('txBtn').innerHTML = 'Send Transaction → Reveal Message';
      document.getElementById('txBtn').disabled = false;
      document.getElementById('txLinkContainer').innerHTML = '';
      document.getElementById('tryAgainBtn').classList.add('hidden');
      showLockedDefault();
      clearStatus();
      updateSteps(1);
    }

    // ─── Handle account/chain change ─────────────────────────────────────────
    if (window.ethereum) {
      window.ethereum.on('accountsChanged', (accounts) => {
        if (accounts.length === 0) disconnectWallet();
        else disconnectWallet();
      });
      window.ethereum.on('chainChanged', () => {
        disconnectWallet();
        setStatus('Сеть изменена. Подключись заново.', 'info');
        document.getElementById('statusMsg').classList.remove('hidden');
      });
    }
  </script>
</body>
